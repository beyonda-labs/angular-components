@if (field && control) {
    <input
        autocomplete="off"
        bsDatepicker
        class="form-control form-control-sm"
        type="text"
        [id]="field.key"
        [formControl]="datepickerControl"
        [bsConfig]="datepickerConfig"
        [minDate]="getMinDate()"
        [maxDate]="getMaxDate()"
        placeholder="{{ getPlaceholder() | translate }}"
        [class.ng-dirty]="control.dirty"
        [class.ng-invalid]="control.invalid"
        [class.ng-touched]="control.touched"
        [attr.aria-required]="field.isRequired || null"
        [attr.aria-invalid]="isInvalid() || null"
        (blur)="markAsTouched()"
    />
}
