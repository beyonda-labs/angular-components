@if (field && control) {
    <input
        class="form-control form-control-sm"
        type="text"
        [id]="field.key"
        [formControl]="control"
        placeholder="{{ getPlaceholder() | translate }}"
        [attr.aria-required]="field.isRequired || null"
        [attr.aria-invalid]="isInvalid() || null"
    />
}
