@if (field && control) {
    <select
        class="form-select form-select-sm"
        [id]="field.key"
        [formControl]="control"
        [attr.aria-required]="field.isRequired || null"
        [attr.aria-invalid]="isInvalid() || null"
    >
        <option value="" disabled>{{ getPlaceholder() | translate }}</option>
        @for (option of field.options; track option.value) {
            <option [value]="option.value" [disabled]="option.isDisabled ?? false">
                {{ option.label | translate }}
            </option>
        }
    </select>
}
