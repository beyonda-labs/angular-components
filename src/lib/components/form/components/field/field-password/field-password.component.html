@if (field && control) {
    <div class="bey-password-wrapper">
        <input
            class="form-control form-control-sm"
            [type]="isVisible ? 'text' : 'password'"
            [id]="field.key"
            [formControl]="control"
            placeholder="{{ getPlaceholder() | translate }}"
            [attr.aria-required]="field.isRequired || null"
            [attr.aria-invalid]="isInvalid() || null"
        />
        @if (field.showToggle) {
            <button
                type="button"
                role="button"
                title="Password-toggle"
                class="bey-password-toggle"
                tabindex="-1"
                (click)="toggleVisibility()"
                [attr.aria-label]="isVisible ? 'Hide password' : 'Show password'"
            >
                <fa-icon [icon]="isVisible ? eyeSlashIcon : eyeIcon" size="sm"></fa-icon>
            </button>
        }
    </div>
}
