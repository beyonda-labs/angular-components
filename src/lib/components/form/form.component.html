@if (config && config.formGroup) {
    <div style="width: calc(100% + 1.5rem)">
        <!-- sections -->
        <div class="w-100 overflow-y-auto overflow-x-hidden">
            @for (section of config.sections; track $index) {
                <bey-form-section [section]="section" [formConfig]="config"></bey-form-section>
            }
        </div>
        <!-- buttons -->
        <div class="w-100 mt-2 d-flex justify-content-end pe-4">
            @for (button of config.buttons; track $index) {
                <bey-button [button]="getFormButton(button)"></bey-button>
            }
        </div>
    </div>
}
