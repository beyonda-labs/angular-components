@if (config) {
    <div class="bey-pagination-shell d-flex align-items-center justify-content-between gap-3 flex-wrap">
        <div class="d-flex align-items-center">
            <label class="bey-pagination-label d-flex align-items-center gap-2 mb-0" [for]="pageSizeId">
                {{ 'angular-components.pagination.page-size' | translate }}

                <select
                    [id]="pageSizeId"
                    class="form-select bey-pagination-select"
                    data-testid="page-size-select"
                    [ngModel]="config.pageSize"
                    aria-label="Page size"
                    (ngModelChange)="onPageSizeChange($event)"
                >
                    @for (pageSizeOption of pageSizeOptions; track pageSizeOption) {
                        <option [ngValue]="pageSizeOption">{{ pageSizeOption }}</option>
                    }
                </select>
            </label>
        </div>

        <div class="d-flex align-items-center flex-wrap gap-1 bey-pagination-content">
            @if (shouldShowFirstLastButtons) {
                <button
                    type="button"
                    class="btn bey-pagination-icon-button"
                    data-testid="first-page-button"
                    [disabled]="isFirstPage"
                    [attr.aria-label]="'angular-components.pagination.first-page' | translate"
                    (click)="goToFirstPage()"
                >
                    <fa-icon [icon]="firstPageIcon"></fa-icon>
                    <span class="visually-hidden">{{ 'angular-components.pagination.first-page' | translate }}</span>
                </button>
            }

            <button
                type="button"
                class="btn bey-pagination-icon-button"
                data-testid="previous-page-button"
                [disabled]="isFirstPage"
                [attr.aria-label]="'angular-components.pagination.previous-page' | translate"
                (click)="goToPreviousPage()"
            >
                <fa-icon [icon]="previousPageIcon"></fa-icon>
                <span class="visually-hidden">{{ 'angular-components.pagination.previous-page' | translate }}</span>
            </button>

            <div class="d-flex align-items-center gap-2 bey-pagination-status">
                <label class="visually-hidden" [for]="pageInputId">
                    {{ 'angular-components.pagination.current-page' | translate }}
                </label>

                <input
                    [id]="pageInputId"
                    type="number"
                    min="1"
                    [max]="totalPages"
                    inputmode="numeric"
                    class="form-control bey-pagination-input"
                    data-testid="page-input"
                    [ngModel]="pageInputValue"
                    [style.width]="pageInputWidth"
                    aria-label="Current page"
                    placeholder="1"
                    (blur)="onPageInputBlur()"
                    (ngModelChange)="onPageInputChange($event)"
                />

                <span class="bey-pagination-total">
                    {{ 'angular-components.pagination.of' | translate: { total: totalPages } }}
                </span>

                <button
                    type="button"
                    class="btn bey-pagination-icon-button bey-pagination-info-button"
                    data-testid="results-info-button"
                    [attr.aria-label]="
                        'angular-components.pagination.results-range' | translate: getResultsTooltipParams()
                    "
                    [tooltip]="'angular-components.pagination.results-range' | translate: getResultsTooltipParams()"
                    container="body"
                >
                    <fa-icon [icon]="infoIcon"></fa-icon>
                    <span class="visually-hidden">
                        {{ 'angular-components.pagination.results-range' | translate: getResultsTooltipParams() }}
                    </span>
                </button>
            </div>

            <button
                type="button"
                class="btn bey-pagination-icon-button"
                data-testid="next-page-button"
                [disabled]="isLastPage"
                [attr.aria-label]="'angular-components.pagination.next-page' | translate"
                (click)="goToNextPage()"
            >
                <fa-icon [icon]="nextPageIcon"></fa-icon>
                <span class="visually-hidden">{{ 'angular-components.pagination.next-page' | translate }}</span>
            </button>

            @if (shouldShowFirstLastButtons) {
                <button
                    type="button"
                    class="btn bey-pagination-icon-button"
                    data-testid="last-page-button"
                    [disabled]="isLastPage"
                    [attr.aria-label]="'angular-components.pagination.last-page' | translate"
                    (click)="goToLastPage()"
                >
                    <fa-icon [icon]="lastPageIcon"></fa-icon>
                    <span class="visually-hidden">{{ 'angular-components.pagination.last-page' | translate }}</span>
                </button>
            }
        </div>
    </div>
}
